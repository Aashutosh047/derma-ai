<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DermAI Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #eef4f0;
    min-height: 100vh;
  }

  /* ── BUBBLE WRAPPER ──────────────────────────────────────────────── */
  .bubble-wrapper {
    position: fixed;
    bottom: 28px;
    right: 28px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    z-index: 1000;
  }

  /* ── CHAT WITH ME TOOLTIP ────────────────────────────────────────── */
  .bubble-tooltip {
    background: linear-gradient(135deg, #3a7d5a, #5aab7e);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 20px 20px 4px 20px;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(58,125,90,0.35);
    animation: tooltipBounce 2.5s ease-in-out infinite;
    position: relative;
    cursor: pointer;
  }

  /* little tail pointer */
  .bubble-tooltip::after {
    content: '';
    position: absolute;
    bottom: -8px;
    right: 18px;
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 0px solid transparent;
    border-top: 9px solid #5aab7e;
  }

  @keyframes tooltipBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-5px); }
  }

  /* ── BUBBLE BUTTON ───────────────────────────────────────────────── */
  .chat-bubble {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #3a7d5a, #5aab7e);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 28px rgba(58,125,90,0.50);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    flex-shrink: 0;
  }

  .chat-bubble:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 34px rgba(58,125,90,0.60);
  }

  .chat-bubble .bubble-icon {
    font-size: 30px;
  }

  .chat-bubble .unread-dot {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 16px;
    height: 16px;
    background: #ff5c5c;
    border-radius: 50%;
    border: 2px solid white;
    display: none;
    animation: pulseDot 1.5s infinite;
  }

  @keyframes pulseDot {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.25); }
  }

  @keyframes bubblePop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ── CHAT WINDOW ─────────────────────────────────────────────────── */
  .chat-window {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 420px;
    height: 640px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 12px 50px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 1000;
    transform-origin: bottom right;
    animation: windowOpen 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes windowOpen {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .chat-window.closing {
    animation: windowClose 0.25s ease forwards;
  }

  @keyframes windowClose {
    from { transform: scale(1); opacity: 1; }
    to   { transform: scale(0.5); opacity: 0; }
  }

  .hidden { display: none !important; }

  /* ── HEADER ──────────────────────────────────────────────────────── */
  .chat-header {
    background: linear-gradient(135deg, #3a7d5a, #5aab7e);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .avatar-bot {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.22);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .header-info h3 { color: #fff; font-size: 0.92rem; font-weight: 600; }
  .header-info span { color: rgba(255,255,255,0.78); font-size: 0.70rem; }

  .header-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: #b8f5d0;
    border-radius: 50%;
    box-shadow: 0 0 6px #b8f5d0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .minimize-btn {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.18);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 16px;
    line-height: 1;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .minimize-btn:hover { background: rgba(255,255,255,0.32); }

  /* ── CHAT BODY ───────────────────────────────────────────────────── */
  .chat-area {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .mode-badge {
    text-align: center;
    font-size: 0.67rem;
    padding: 5px;
    background: #f0f8f3;
    color: #4a9168;
    font-weight: 500;
    border-bottom: 1px solid #dceee4;
    flex-shrink: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: #c2dece; border-radius: 3px; }

  .msg { display: flex; gap: 8px; animation: popIn 0.25s ease; }
  .msg.user { flex-direction: row-reverse; }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.bot { background: linear-gradient(135deg, #3a7d5a, #5aab7e); }
  .msg-avatar.user { background: #e4f0e9; }

  .bubble {
    max-width: 80%;
    padding: 10px 13px;
    border-radius: 16px;
    font-size: 0.81rem;
    line-height: 1.65;
  }

  .bubble.bot {
    background: #f0f8f3;
    color: #2a3d30;
    border-bottom-left-radius: 4px;
    border: 1px solid #d4eddd;
  }

  .bubble.user {
    background: linear-gradient(135deg, #3a7d5a, #5aab7e);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bubble b { color: #2e7d52; }
  .bubble.user b { color: #d4f5e2; }

  .quick-replies {
    padding: 6px 12px 8px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .qr-btn {
    padding: 5px 10px;
    background: #f0f8f3;
    border: 1px solid #b8ddc8;
    border-radius: 20px;
    font-size: 0.69rem;
    color: #3a7d5a;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .qr-btn:hover { background: #3a7d5a; color: white; border-color: #3a7d5a; }

  .typing { display: flex; gap: 8px; align-items: flex-end; }

  .typing-bubble {
    background: #f0f8f3;
    border: 1px solid #d4eddd;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 10px 14px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    background: #5aab7e;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.5;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40%           { transform: scale(1.1); opacity: 1; }
  }

  .input-bar {
    padding: 10px 12px;
    border-top: 1px solid #dceee4;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #fff;
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    border: 1.5px solid #c2dece;
    border-radius: 20px;
    padding: 9px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 0.81rem;
    outline: none;
    resize: none;
    min-height: 38px;
    max-height: 100px;
    line-height: 1.4;
    color: #333;
    transition: border-color 0.2s;
    background: #f5fbf7;
  }

  .chat-input:focus { border-color: #3a7d5a; }
  .chat-input::placeholder { color: #bbb; }

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #3a7d5a, #5aab7e);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(58,125,90,0.3);
  }

  .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .disclaimer {
    text-align: center;
    font-size: 0.60rem;
    color: #b0c8ba;
    padding: 3px 14px 8px;
    flex-shrink: 0;
  }

  @media (max-width: 480px) {
    .chat-window {
      width: calc(100vw - 24px);
      height: calc(100vh - 110px);
      bottom: 100px;
      right: 12px;
    }
    .bubble-wrapper { bottom: 20px; right: 16px; }
  }
</style>
</head>
<body>

<!-- MINIMIZED BUBBLE -->
<div class="bubble-wrapper hidden" id="bubbleWrapper">
  <div class="bubble-tooltip" onclick="openChat()">💬 Chat with me!</div>
  <div class="chat-bubble" onclick="openChat()">
    <span class="bubble-icon">🩺</span>
    <span class="unread-dot" id="unreadDot"></span>
  </div>
</div>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <div class="avatar-bot">🩺</div>
    <div class="header-info">
      <h3>DermAI Assistant</h3>
      <span>Hair &amp; Skin Health</span>
    </div>
    <div class="header-actions">
      <div class="status-dot"></div>
      <button class="minimize-btn" onclick="minimizeChat()" title="Minimize">－</button>
    </div>
  </div>

  <div class="chat-area">
    <div class="mode-badge" id="modeBadge">🩺 DermAI — Hair &amp; Skin Assistant</div>
    <div class="messages" id="messages"></div>
    <div class="quick-replies" id="quickReplies"></div>
    <div class="input-bar">
      <textarea class="chat-input" id="chatInput" placeholder="Ask something..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="disclaimer">⚠️ For informational purposes only. Always consult a dermatologist.</div>
  </div>
</div>

<script>
  const GROQ_API_KEY = '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';
  const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
  const GROQ_MODEL = 'llama-3.3-70b-versatile';

  let report = null;
  let history = [];
  let systemPrompt = '';
  let chatStarted = false;
  let isMinimized = false;

  const SYSTEM_HAIR = `You are DermAI, a warm and empathetic medical assistant specializing in hair and scalp conditions. You help patients understand diagnosis reports from an AI system combining CNN image analysis with lifestyle questionnaire data.

Personality:
- Warm, caring, and reassuring — never cold or clinical
- Simple language, avoid heavy jargon
- Sensitive — especially with young patients facing hair loss
- Concise responses (3-5 sentences max unless asked for more detail)
- Never diagnose yourself — interpret the model's output only
- Always recommend seeing a dermatologist for confirmation

Report contents:
- User profile: name, age, gender
- CNN result: image-based diagnosis + confidence %
- Questionnaire ML predictions: lifestyle-based probabilities across 10 conditions
- Fusion result: final combined diagnosis, confidence level, questionnaire role

Fusion model logic:
- 70% weight on CNN image, 30% on questionnaire
- questionnaire_role "boost": both models agree — stronger confidence
- questionnaire_role "alternative": models disagree — flag alternative
- questionnaire_role "weak_support": questionnaire added little, image drove result

Supported conditions: Alopecia Areata, Contact Dermatitis, Folliculitis, Head Lice, Lichen Planus, Male Pattern Baldness, Psoriasis, Seborrheic Dermatitis, Telogen Effluvium, Tinea Capitis.

Always address the patient by first name if known. Start warm and personal.`;

  const SYSTEM_SKIN = `You are DermAI, a warm and empathetic medical assistant specializing in skin conditions. You help patients understand diagnosis reports from an AI image analysis model.

Personality:
- Warm, caring, and reassuring
- Simple language, avoid heavy jargon
- Concise responses (3-5 sentences unless asked for more)
- Never diagnose yourself — interpret the model's output only
- Always recommend seeing a dermatologist for confirmation

Always address the patient by first name if known. Start warm and personal.`;

  const SYSTEM_GENERAL = `You are DermAI, a warm and empathetic medical assistant specializing in hair, scalp, and skin conditions.

Personality:
- Warm, caring, and reassuring — never cold or clinical
- Simple language, avoid heavy jargon
- Concise responses (3-5 sentences max unless asked for more detail)
- Always recommend seeing a dermatologist for confirmed diagnosis

You can discuss: Alopecia Areata, Contact Dermatitis, Folliculitis, Head Lice, Lichen Planus, Male Pattern Baldness, Psoriasis, Seborrheic Dermatitis, Telogen Effluvium, Tinea Capitis, and general skin/hair concerns.

Start with a warm friendly greeting and ask how you can help.`;

  function minimizeChat() {
    const win = document.getElementById('chatWindow');
    isMinimized = true;
    win.classList.add('closing');
    setTimeout(() => {
      win.classList.add('hidden');
      win.classList.remove('closing');
      document.getElementById('bubbleWrapper').classList.remove('hidden');
    }, 240);
  }

  function openChat() {
    const win = document.getElementById('chatWindow');
    isMinimized = false;
    document.getElementById('bubbleWrapper').classList.add('hidden');
    document.getElementById('unreadDot').style.display = 'none';
    win.classList.remove('hidden');
    win.style.animation = 'none';
    requestAnimationFrame(() => {
      win.style.animation = 'windowOpen 0.35s cubic-bezier(0.34,1.56,0.64,1)';
    });
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
    document.getElementById('chatInput').focus();
  }

  window.loadDermReport = function(data) { startChat(data); };

  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'DERM_REPORT') startChat(event.data.report);
  });

  window.addEventListener('DOMContentLoaded', function() {
    startChat(window.DERM_REPORT || null);
  });

  function startChat(data) {
    if (chatStarted) return;
    chatStarted = true;
    report = data || null;

    let mode = 'general';
    if (report && report.fusion_result) mode = 'hair';
    else if (report && report.cnn_result) mode = 'skin';

    systemPrompt = mode === 'hair' ? SYSTEM_HAIR : mode === 'skin' ? SYSTEM_SKIN : SYSTEM_GENERAL;

    document.getElementById('modeBadge').textContent =
      mode === 'hair' ? '🧬 Hair Model — Image + Questionnaire Fusion' :
      mode === 'skin' ? '🔬 Skin Model — Image Analysis Only' :
      '🩺 DermAI — Hair & Skin Assistant';

    renderQuickReplies(mode);

    const contextMsg = mode === 'hair'
      ? `Here is the patient's hair diagnosis report:\n\n${JSON.stringify(report, null, 2)}\n\nGreet the patient warmly by first name and give a brief friendly 3-4 sentence summary of their diagnosis. Be extra reassuring if it's hair loss in a young person.`
      : mode === 'skin'
      ? `Here is the patient's skin diagnosis report:\n\n${JSON.stringify(report, null, 2)}\n\nGreet the patient warmly by first name and give a brief friendly 3-4 sentence summary of what the image model detected. Be clear and reassuring.`
      : `Greet the user warmly and let them know you're DermAI, here to help with any hair or skin health questions. Keep it to 2-3 sentences, friendly and inviting.`;

    history = [];
    callAPI(contextMsg, true);
  }

  function renderQuickReplies(mode) {
    const questions = mode === 'hair'
      ? [['What does this mean?','What does this diagnosis mean?'],['Treatments?','What treatment options are available?'],['Causes?','What causes this condition?'],['Both models?','Can you explain what the image and questionnaire models each found?'],['See a doctor?','Should I see a dermatologist?']]
      : mode === 'skin'
      ? [['What does this mean?','What does this diagnosis mean?'],['Treatments?','What treatment options are available?'],['Causes?','What causes this condition?'],['How serious?','How serious is this condition?'],['See a doctor?','Should I see a dermatologist?']]
      : [['Hair loss causes?','What are common causes of hair loss?'],['Scalp conditions?','What are common scalp conditions?'],['Skin conditions?','What are common skin conditions?'],['See a doctor?','When should I see a dermatologist?']];

    document.getElementById('quickReplies').innerHTML = questions
      .map(([label, q]) => `<button class="qr-btn" onclick="sendQuick('${q.replace(/'/g,"\\'")}')">${label}</button>`)
      .join('');
  }

  async function callAPI(userMessage, isInitial = false) {
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    if (!isInitial) addBubble('user', userMessage);
    history.push({ role: 'user', content: userMessage });
    const typingEl = showTyping();

    try {
      const res = await fetch(GROQ_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
        body: JSON.stringify({
          model: GROQ_MODEL,
          max_tokens: 1000,
          temperature: 0.7,
          messages: [{ role: 'system', content: systemPrompt }, ...history]
        })
      });

      const data = await res.json();
      if (data.error) { typingEl.remove(); addBubble('bot', `⚠️ ${data.error.message}`); sendBtn.disabled = false; return; }

      const reply = data.choices?.[0]?.message?.content || 'Sorry, I could not generate a response.';
      typingEl.remove();
      addBubble('bot', reply);
      history.push({ role: 'assistant', content: reply });
      if (isMinimized) document.getElementById('unreadDot').style.display = 'block';

    } catch(err) {
      typingEl.remove();
      addBubble('bot', "I'm having trouble connecting. Please check your internet connection.");
      console.error(err);
    }

    sendBtn.disabled = false;
    if (!isMinimized) document.getElementById('chatInput').focus();
  }

  function addBubble(role, text) {
    const messages = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = `msg-avatar ${role}`;
    av.textContent = role === 'bot' ? '🩺' : '👤';
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    msg.appendChild(av);
    msg.appendChild(bubble);
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg typing';
    div.innerHTML = `<div class="msg-avatar bot">🩺</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('quickReplies').style.display = 'none';
    callAPI(text);
  }

  function sendQuick(text) {
    document.getElementById('quickReplies').style.display = 'none';
    callAPI(text);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>
</body>
</html>
